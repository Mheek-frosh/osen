<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/styles.css"><title>Secure Checkout — Osen Luxe</title></head><body data-page="checkout">
<div class="announcement"><span>Secure checkout · Osen Luxe</span></div><header class="site-header checkout-header"><a class="text-action" href="/cart.html">← Back to bag</a><a class="logo" href="/"><strong>OSEN</strong><small>LUXE</small></a><span class="checkout-lock">Secure checkout</span></header>
<main class="checkout-page section-pad"><div class="checkout-grid"><form class="checkout-form"><p class="eyebrow">Complete your order</p><h1>Checkout</h1><fieldset><legend>Contact</legend><label>Email address<input type="email" required placeholder="you@example.com"></label><label>Phone number<input type="tel" required placeholder="+234"></label></fieldset><fieldset><legend>Delivery address</legend><div class="form-split"><label>First name<input required></label><label>Last name<input required></label></div><label>Address<input required placeholder="Street and house number"></label><div class="form-split"><label>City<input required value="Lagos"></label><label>State<select required><option>Lagos</option><option>Abuja FCT</option><option>Rivers</option><option>Oyo</option><option>Other</option></select></label></div></fieldset><fieldset><legend>Payment</legend><div class="payment-note"><strong>Card / bank transfer</strong><span>Secure payment details will be collected by your connected payment provider.</span></div></fieldset><button class="btn btn-dark" type="submit">Place order <span>↗</span></button></form><aside class="checkout-items"></aside></div></main><script type="module" src="/page-app.js"></script></body></html>
